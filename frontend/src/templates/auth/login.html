<!-- --- TELA DE LOGIN --- -->
<div class="auth-card">
    <h1>ERP Acadêmico</h1>
    <p class="subtitle">Sistema de Gestão Escolar</p>

    <form id="formLogin" novalidate>
        <div class="field">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="voce@escola.com" required autofocus />
        </div>

        <div class="field">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="••••••••" required />
        </div>

        <p id="loginMsg" class="msg-error" hidden></p>

        <button type="submit" class="btn btn-block" id="btnEntrar">Entrar</button>
    </form>
</div>
