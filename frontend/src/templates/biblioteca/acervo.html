<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <title>Biblioteca - Acervo</title>
        <link rel="stylesheet" href="/src/styles/main.css" />
    </head>
    <body>
        <header></header>
        <main id="app" class="container">
            <!-- --- CADASTRO / EDICAO DE LIVRO --- -->
            <section class="card">
                <h2>Cadastro de Livros</h2>
                <form id="formLivro" class="grid">
                    <label>Título<input name="titulo" required /></label>
                    <label>Autor<input name="autor" required /></label>
                    <label>ISBN<input name="isbn" /></label>
                    <label>Editora<input name="editora" /></label>
                    <label>Ano<input name="anoPublicacao" type="number" /></label>
                    <label>Edição<input name="edicao" /></label>
                    <label>Páginas<input name="paginas" type="number" /></label>
                    <label>Categoria<input name="categoria" /></label>
                    <label>Capa (imagem)<input name="capa" type="file" accept="image/*" /></label>
                    <label>Sinopse<textarea name="sinopse"></textarea></label>
                    <div class="toolbar" style="grid-column:1/-1">
                        <button type="submit">Salvar</button>
                        <button type="button" id="btnLimpar" class="secondary">Limpar</button>
                        <span id="formMsg"></span>
                    </div>
                </form>
            </section>

            <!-- --- BUSCA --- -->
            <section class="card">
                <h2>Buscar</h2>
                <form id="formBusca" class="toolbar">
                    <label>Título<input name="titulo" /></label>
                    <label>Autor<input name="autor" /></label>
                    <label>Categoria<input name="categoria" /></label>
                    <label>ISBN<input name="isbn" /></label>
                    <button type="submit">Filtrar</button>
                    <button type="button" id="btnLimparBusca" class="secondary">Limpar</button>
                </form>
            </section>

            <!-- --- RESULTADOS --- -->
            <section class="card">
                <h2>Resultados</h2>
                <p id="listaMsg" class="msg-error" hidden></p>
                <table>
                    <thead>
                        <tr>
                            <th>Título</th><th>Autor</th><th>Categoria</th>
                            <th>ISBN</th><th>Exemplares</th><th>Criado</th><th></th>
                        </tr>
                    </thead>
                    <tbody id="tbodyLivros"></tbody>
                </table>
            </section>
        </main>

        <!-- --- TEMPLATE: LINHA DA TABELA DE LIVROS --- -->
        <template id="rowLivro">
            <tr>
                <td data-cell="titulo"></td>
                <td data-cell="autor"></td>
                <td data-cell="categoria"></td>
                <td data-cell="isbn"></td>
                <td data-cell="exemplares"></td>
                <td data-cell="criado"></td>
                <td>
                    <button data-action="editar" class="secondary">Editar</button>
                    <button data-action="excluir" class="danger">Excluir</button>
                </td>
            </tr>
        </template>

        <!-- --- TEMPLATE: LINHA VAZIA --- -->
        <template id="rowVazio">
            <tr><td colspan="7">Nenhum livro encontrado.</td></tr>
        </template>

        <script type="module" src="../../scripts/pages/biblioteca/acervo.js"></script>
    </body>
</html>
