<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <title>Biblioteca - Empréstimos</title>
        <link rel="stylesheet" href="/src/styles/main.css" />
    </head>
    <body>
        <header></header>
        <main id="app" class="container">
            <section class="card">
                <h2>Novo empréstimo</h2>
                <form id="formEmp" class="toolbar">
                    <label>Código de barras do exemplar
                        <input
                                name="codigoBarras"
                                required
                                autofocus
                        />
                    </label>
                    <label>ID do usuário (aluno/professor)
                        <input
                                name="usuarioId"
                                required
                        />
                    </label>
                    <button type="submit">Registrar</button>
                    <span id="msg"></span>
                </form>
            </section>

            <section class="card">
                <h2>Consultar empréstimos por usuário</h2>
                <form id="formCons" class="toolbar">
                    <label>ID do usuário
                        <input
                                name="usuarioId"
                                required
                        />
                    </label>
                    <button type="submit">Listar</button>
                </form>
                <table>
                    <thead>
                        <tr>
                            <th>Livro</th>
                            <th>Código</th>
                            <th>Empréstimo</th>
                            <th>Prev. devolução</th>
                            <th>Devolvido em</th>
                            <th>Status</th>
                            <th>Renovações</th>
                            <th>Multa</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </section>
        </main>

        <template id="rowEmp">
            <tr>
                <td data-cell="livro"></td>
                <td data-cell="codigo"></td>
                <td data-cell="emprestimo"></td>
                <td data-cell="prev"></td>
                <td data-cell="devolvido"></td>
                <td data-cell="status"></td>
                <td data-cell="renovacoes"></td>
                <td data-cell="multa"></td>
            </tr>
        </template>

        <template id="rowVazio">
            <tr>
                <td colspan="8">Nenhum empréstimo.</td>
            </tr>
        </template>

        <script type="module" src="../../scripts/pages/biblioteca/emprestimos.js"></script>
    </body>
</html>
