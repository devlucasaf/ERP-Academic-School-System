<!-- --- TELA DE FUNCIONÁRIOS (SECRETARIA) --- -->
<section class="card">
    <div class="toolbar toolbar-between">
        <h1>Funcionários</h1>
        <button class="btn" id="btnNovo">+ Novo funcionário</button>
    </div>

    <form id="formFiltro" class="toolbar">
        <label class="field">Cargo
            <select name="cargo">
                <option value="">Todos</option>
                <option value="COORDENADOR">COORDENADOR</option>
                <option value="SECRETARIA">SECRETARIA</option>
                <option value="BIBLIOTECARIO">BIBLIOTECARIO</option>
                <option value="FINANCEIRO">FINANCEIRO</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </label>
        <label class="field">Filtrar na página<input name="busca" placeholder="nome, e-mail..." /></label>
        <button type="submit" class="btn">Aplicar</button>
    </form>

    <table>
        <thead>
            <tr><th>Nome</th><th>E-mail</th><th>Cargo</th><th>Departamento</th><th>Admissão</th><th></th></tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
    <div class="toolbar paginacao" id="paginacao"></div>
</section>

<!-- --- TEMPLATE: LINHA DA TABELA --- -->
<template id="linha">
    <tr>
        <td data-campo="nome"></td>
        <td data-campo="email"></td>
        <td data-campo="cargo"></td>
        <td data-campo="departamento"></td>
        <td data-campo="admissao"></td>
        <td class="acoes">
            <button class="btn secondary btn-sm" data-acao="editar">Editar</button>
            <button class="btn danger btn-sm" data-acao="excluir">Excluir</button>
        </td>
    </tr>
</template>
<template id="linhaVazia">
    <tr><td colspan="6">Nenhum funcionário encontrado.</td></tr>
</template>

<!-- --- MODAL DE CRIAR/EDITAR --- -->
<div class="modal-overlay" id="modal" hidden>
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitulo">Novo funcionário</h2>
            <button class="icon-btn" id="btnFechar" aria-label="Fechar">✕</button>
        </div>
        <form id="formFuncionario" class="form-grid">
            <div class="field">Nome<input name="nome" required /></div>
            <div class="field">E-mail<input name="email" type="email" required /></div>
            <div class="field">CPF<input name="cpf" /></div>
            <div class="field">Telefone<input name="telefone" /></div>
            <div class="field">Nascimento<input name="dataNascimento" type="date" /></div>
            <div class="field">Cargo
                <select name="cargo" required>
                    <option value="COORDENADOR">COORDENADOR</option>
                    <option value="SECRETARIA">SECRETARIA</option>
                    <option value="BIBLIOTECARIO">BIBLIOTECARIO</option>
                    <option value="FINANCEIRO">FINANCEIRO</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>
            <div class="field">Data de admissão<input name="dataAdmissao" type="date" required /></div>
            <div class="field">Departamento<input name="departamento" /></div>
            <p class="msg-error field-full" id="modalMsg" hidden></p>
            <div class="toolbar field-full toolbar-between">
                <span class="muted">A senha é gerada automaticamente e enviada por e-mail.</span>
                <span>
                    <button type="button" class="btn secondary" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn" id="btnSalvar">Salvar</button>
                </span>
            </div>
        </form>
    </div>
</div>
