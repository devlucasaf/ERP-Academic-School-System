<section class="card">
    <div class="toolbar toolbar-between">
        <h1>Professores</h1>
        <button class="btn" id="btnNovo">+ Novo professor</button>
    </div>

    <form id="formFiltro" class="toolbar">
        <label class="field">
            Filtrar na página
            <input
                    name="busca"
                    placeholder="nome, e-mail, formação..."
            />
        </label>
        <button type="submit" class="btn">Aplicar</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Formação</th>
                <th>Área</th>
                <th>Admissão</th>
                <th>Ativo</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
    <div class="toolbar paginacao" id="paginacao"></div>
</section>

<template id="linha">
    <tr>
        <td data-campo="nome"></td>
        <td data-campo="email"></td>
        <td data-campo="formacao"></td>
        <td data-campo="area"></td>
        <td data-campo="admissao"></td>
        <td data-campo="ativo"></td>
        <td class="acoes">
            <button class="btn secondary btn-sm" data-acao="editar">Editar</button>
            <button class="btn danger btn-sm" data-acao="excluir">Excluir</button>
        </td>
    </tr>
</template>

<template id="linhaVazia">
    <tr>
        <td colspan="7">Nenhum professor encontrado.</td>
    </tr>
</template>

<div class="modal-overlay" id="modal" hidden>
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitulo">Novo professor</h2>
            <button class="icon-btn" id="btnFechar" aria-label="Fechar">✕</button>
        </div>
        <form id="formProfessor" class="form-grid">
            <div class="field">
                Nome
                <input
                        name="nome"
                        required
                />
            </div>

            <div class="field">
                E-mail
                <input
                        name="email"
                        type="email"
                        required
                />
            </div>

            <div class="field">
                CPF
                <input name="cpf" />
            </div>

            <div class="field">
                Telefone
                <input name="telefone" />
            </div>

            <div class="field">
                Nascimento
                <input
                        name="dataNascimento"
                        type="date"
                />
            </div>

            <div class="field">
                Formação
                <input name="formacao" />
            </div>

            <div class="field">
                Área de atuação
                <input name="areaAtuacao" />
            </div>
            <div class="field">
                Carga horária semanal
                <input
                        name="cargaHorariaSemanal"
                        type="number"
                        min="1"
                />
            </div>
            <div class="field">
                Data de admissão
                <input
                        name="dataAdmissao"
                        type="date"
                        required
                />
            </div>

            <label class="field field-inline">
                <input
                        name="ativo"
                        type="checkbox"
                        checked
                />
                Ativo
            </label>
            <p class="msg-error field-full" id="modalMsg" hidden></p>
            <div class="toolbar field-full toolbar-between">
                <span class="muted">A senha é gerada automaticamente e enviada por e-mail.</span>
                <span>
                    <button type="button" class="btn secondary" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn" id="btnSalvar">Salvar</button>
                </span>
            </div>
        </form>
    </div>
</div>
