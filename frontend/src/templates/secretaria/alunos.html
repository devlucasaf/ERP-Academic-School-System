<section class="card">
    <div class="toolbar toolbar-between">
        <h1>Alunos</h1>
        <button class="btn" id="btnNovo">+ Novo aluno</button>
    </div>

    <form id="formFiltro" class="toolbar">
        <label class="field">Status
            <select name="status">
                <option value="">Todos</option>
                <option value="ATIVO">ATIVO</option>
                <option value="TRANCADO">TRANCADO</option>
                <option value="FORMADO">FORMADO</option>
                <option value="EVADIDO">EVADIDO</option>
            </select>
        </label>
        <label class="field">Filtrar na página
            <input
                    name="busca"
                    placeholder="nome, e-mail, RA..."
            />
        </label>
        <button type="submit" class="btn">Aplicar</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>RA</th>
                <th>Status</th>
                <th>Ingresso</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
    <div class="toolbar paginacao" id="paginacao"></div>
</section>

<template id="linha">
    <tr>
        <td data-campo="nome"></td>
        <td data-campo="email"></td>
        <td data-campo="ra"></td>
        <td data-campo="status"></td>
        <td data-campo="ingresso"></td>
        <td class="acoes">
            <button class="btn secondary btn-sm" data-acao="editar">Editar</button>
            <button class="btn danger btn-sm" data-acao="excluir">Excluir</button>
        </td>
    </tr>
</template>
<template id="linhaVazia">
    <tr>
        <td colspan="6">Nenhum aluno encontrado.</td>
    </tr>
</template>

<div class="modal-overlay" id="modal" hidden>
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitulo">Novo aluno</h2>
            <button class="icon-btn" id="btnFechar" aria-label="Fechar">✕</button>
        </div>

        <form id="formAluno" class="form-grid">
            <div class="field">
                Nome
                <input
                        name="nome"
                        required
                />
            </div>
            <div class="field">
                E-mail
                <input
                        name="email"
                        type="email"
                        required
                />
            </div>
            <div class="field">
                CPF
                <input name="cpf" />
            </div>
            <div class="field">
                Telefone
                <input name="telefone" />
            </div>
            <div class="field">
                Nascimento
                <input
                        name="dataNascimento"
                        type="date"
                />
            </div>
            <div class="field">
                Matrícula (RA)
                <input
                        name="matriculaRA"
                        required
                />
            </div>
            <div class="field">
                Data de ingresso
                <input
                        name="dataIngresso"
                        type="date"
                        required
                />
            </div>
            <div class="field">Status
                <select name="status" required>
                    <option value="ATIVO">ATIVO</option>
                    <option value="TRANCADO">TRANCADO</option>
                    <option value="FORMADO">FORMADO</option>
                    <option value="EVADIDO">EVADIDO</option>
                </select>
            </div>
            <div class="field field-full">
                Observações
                <textarea name="observacoes"></textarea>
            </div>
            <p class="msg-error field-full" id="modalMsg" hidden></p>
            <div class="toolbar field-full toolbar-between">
                <span class="muted">A senha é gerada automaticamente e enviada por e-mail.</span>
                <span>
                    <button type="button" class="btn secondary" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn" id="btnSalvar">Salvar</button>
                </span>
            </div>
        </form>
    </div>
</div>
