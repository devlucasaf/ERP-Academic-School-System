spring:
  application:
    name: erp-academic-school-system

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=erp_academic_db;encrypt=true;trustServerCertificate=true
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /api

# JWT
security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production}
    issuer: erp-academic
    expiration-minutes: 120
    refresh-expiration-minutes: 10080

# Storage de arquivos (uploads)
app:
  storage:
    type: ${STORAGE_TYPE:local}   # local | s3
    local:
      base-path: ${STORAGE_LOCAL_PATH:./storage}
      public-base-url: /files

# SpringDoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    erp.academico: DEBUG

