# ============================================================
#  ERP-Academic-School-System - CONFIGURACAO DA APLICACAO
# ============================================================
# --- APLICACAO ---
spring.application.name=erp-academic-school-system
# --- DATASOURCE (SQL SERVER) ---
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=erp_academic_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USER:erp_academic_user}
spring.datasource.password=${DB_PASS:Erp@Academic#2025!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
# --- JPA / HIBERNATE ---
# update: o Hibernate CRIA/ATUALIZA as tabelas a partir das @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# --- E-MAIL (SMTP) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# --- UPLOAD (MULTIPART) ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# --- SERVIDOR ---
server.port=8080
server.servlet.context-path=/api
# --- JWT ---
security.jwt.secret=${JWT_SECRET:change-me-in-production}
security.jwt.issuer=erp-academic
# expiration-minutes: 480 = 8 horas
security.jwt.expiration-minutes=480
security.jwt.refresh-expiration-minutes=10080
# --- STORAGE DE ARQUIVOS (UPLOADS) ---
# type: local | s3
app.storage.type=${STORAGE_TYPE:local}
app.storage.local.base-path=${STORAGE_LOCAL_PATH:./storage}
app.storage.local.public-base-url=/files
# --- SPRINGDOC / SWAGGER ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# --- LOGGING ---
logging.level.root=INFO
logging.level.erp.academico=DEBUG
# --- DEV: INICIAR O FRONTEND (VITE) AUTOMATICAMENTE AO SUBIR O BACKEND ---
# true (padrao): o backend roda "npm run dev" e abre o navegador
# false: desativa (use em producao)
app.dev.start-frontend=${START_FRONTEND:true}
